<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍼 유아식 식단 플래너</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
  <style>
    :root {
      --green-50: #EAF3DE;
      --green-100: #C0DD97;
      --green-600: #3B6D11;
      --green-700: #27500A;
      --blue-50: #E6F1FB;
      --blue-600: #185FA5;
      --amber-50: #FAEEDA;
      --amber-600: #854F0B;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    header p {
      font-size: 14px;
      color: #666;
    }

    .action-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: var(--radius-md);
      border: 1px solid #d0d0c8;
      background: #fff;
      color: #333;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #f0f0eb; }
    .btn.primary {
      background: var(--green-600);
      color: #fff;
      border-color: var(--green-600);
    }
    .btn.primary:hover { background: var(--green-700); }

    .day-card {
      background: #fff;
      border: 1px solid #e8e8e2;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }

    .day-label {
      background: var(--green-50);
      color: var(--green-600);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-bottom: 1px solid var(--green-100);
    }

    .meals-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .meal-block {
      padding: 12px 14px;
    }
    .meal-block:first-child {
      border-right: 1px solid #ebebeb;
    }

    .meal-time {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meal-name {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 3px;
    }

    .meal-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 10px;
      min-height: 36px;
    }

    .dinner-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .dinner-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }

    .dinner-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 1px;
      font-weight: 500;
    }
    .tag-rice { background: var(--green-50); color: var(--green-600); }
    .tag-soup { background: var(--blue-50); color: var(--blue-600); }
    .tag-side { background: var(--amber-50); color: var(--amber-600); }

    .dinner-text {
      font-size: 13px;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .meal-actions {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .btn-sm {
      font-size: 12px;
      padding: 3px 9px;
      border: 1px solid #d8d8d0;
      border-radius: var(--radius-md);
      background: transparent;
      color: #666;
      cursor: pointer;
    }
    .btn-sm:hover { background: #f5f5f0; }

    .library {
      background: #fff;
      border: 1px solid #e8e8e2;
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    .library-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .library-header span { font-size: 15px; font-weight: 600; }

    .cat-label {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      margin-top: 12px;
    }
    .cat-label:first-child { margin-top: 0; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #d8d8d0;
      background: #fafaf8;
      cursor: pointer;
      color: #333;
    }
    .chip:hover { border-color: var(--green-600); color: var(--green-600); }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: 340px;
      max-width: 92vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }

    .modal label {
      font-size: 13px;
      color: #666;
      display: block;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    .modal label:first-of-type { margin-top: 0; }

    .modal input,
    .modal select,
    .modal textarea {
      width: 100%;
      font-size: 14px;
      padding: 8px 10px;
      border: 1px solid #d0d0c8;
      border-radius: var(--radius-md);
      background: #fff;
      color: #1a1a1a;
      font-family: inherit;
    }
    .modal textarea { resize: vertical; min-height: 56px; }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: flex-end;
    }

    @media (max-width: 500px) {
      .meals-row { grid-template-columns: 1fr; }
      .meal-block:first-child { border-right: none; border-bottom: 1px solid #ebebeb; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🍼 유아식 식단 플래너</h1>
    <p>15개월 아기를 위한 맞춤 식단</p>
  </header>

  <div class="action-bar">
    <button class="btn primary" onclick="shuffleAll()"><i class="ti ti-refresh"></i> 전체 랜덤 변경</button>
    <button class="btn" onclick="showAddModal()"><i class="ti ti-plus"></i> 메뉴 추가</button>
    <button class="btn" onclick="toggleLibrary()"><i class="ti ti-book"></i> 메뉴 목록</button>
  </div>

  <div id="dayGrid"></div>

  <div class="library" id="menuLibrary" style="display:none;">
    <div class="library-header">
      <span>전체 메뉴 목록</span>
      <button class="btn-sm" onclick="toggleLibrary()">닫기</button>
    </div>
    <div id="libraryContent"></div>
  </div>
</div>

<div class="overlay" id="modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">메뉴 변경</h3>
    <label>카테고리</label>
    <select id="menuCategoryInput">
      <option value="아침">아침 (한그릇)</option>
      <option value="밥">저녁 - 밥</option>
      <option value="국">저녁 - 국·찌개</option>
      <option value="반찬">저녁 - 반찬</option>
    </select>
    <label>메뉴 이름</label>
    <input type="text" id="menuNameInput" placeholder="예: 닭죽" />
    <label>간단 설명</label>
    <textarea id="menuDescInput" placeholder="재료나 특징을 간단히 적어주세요"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn primary" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['월','화','수','목','금','토','일'];

const menuDB = {
  아침: [
    { name: '애호박 닭죽', desc: '닭 육수에 애호박 넣어 부드럽게' },
    { name: '당근 쌀미음', desc: '소화가 잘 되는 부드러운 미음' },
    { name: '브로콜리 흰살생선죽', desc: '오메가3 풍부한 영양 죽' },
    { name: '단호박 소고기죽', desc: '달콤하고 영양 가득한 죽' },
    { name: '시금치 두부죽', desc: '철분과 단백질이 풍부한 죽' },
    { name: '감자 닭살죽', desc: '포만감 좋은 부드러운 죽' },
    { name: '달걀 볶음밥', desc: '달걀과 채소로 만든 부드러운 볶음밥' },
    { name: '바나나 오트밀', desc: '부드럽고 소화 잘 되는 아침 메뉴' },
    { name: '연두부 나물밥', desc: '연두부와 나물을 섞은 부드러운 밥' },
  ],
  밥: [
    { name: '진밥', desc: '' },
    { name: '소고기 진밥', desc: '' },
    { name: '채소 진밥', desc: '' },
    { name: '두부 비빔밥', desc: '' },
    { name: '달걀 덮밥', desc: '' },
    { name: '닭고기 진밥', desc: '' },
  ],
  국: [
    { name: '감자 된장국', desc: '부드러운 감자 넣은 순한 된장국' },
    { name: '애호박 달걀국', desc: '부드럽고 단백질 풍부한 맑은 국' },
    { name: '미역 소고기국', desc: '칼슘과 철분 듬뿍 영양국' },
    { name: '두부 채소국', desc: '맑고 담백한 두부 채소국' },
    { name: '콩나물국', desc: '시원하고 담백한 콩나물국' },
    { name: '무 소고기국', desc: '달고 시원한 무 소고기국' },
    { name: '순두부 맑은국', desc: '부드럽고 단백질 풍부한 순두부국' },
  ],
  반찬: [
    { name: '달걀찜', desc: '부드럽고 단백질 풍부한 반찬' },
    { name: '두부 구이', desc: '기름 없이 구운 담백한 두부' },
    { name: '브로콜리 무침', desc: '살짝 데쳐 부드럽게 무침' },
    { name: '당근 버터볶음', desc: '달콤하게 볶은 당근 반찬' },
    { name: '소고기 장조림', desc: '짜지 않게 조린 소고기 반찬' },
    { name: '감자 매시', desc: '포슬포슬 부드러운 감자 매시' },
    { name: '시금치 나물', desc: '살짝 데친 시금치 무침' },
    { name: '애호박 볶음', desc: '부드럽게 볶은 애호박 반찬' },
    { name: '단호박 조림', desc: '달콤하게 조린 단호박 반찬' },
    { name: '닭 안심 찜', desc: '담백하게 쪄낸 닭 안심' },
  ],
};

const rand = arr => arr[Math.floor(Math.random() * arr.length)];
let plan = [];
let editTarget = null;
let addMode = false;

function newDinner() {
  return {
    rice: rand(menuDB['밥']),
    soup: rand(menuDB['국']),
    side: rand(menuDB['반찬']),
  };
}

function initPlan() {
  plan = DAYS.map(day => ({ day, breakfast: rand(menuDB['아침']), dinner: newDinner() }));
  renderPlan();
}

function shuffleAll() {
  plan.forEach(d => { d.breakfast = rand(menuDB['아침']); d.dinner = newDinner(); });
  renderPlan();
}

function renderPlan() {
  document.getElementById('dayGrid').innerHTML = plan.map((d, i) => `
    <div class="day-card">
      <div class="day-label">${d.day}요일</div>
      <div class="meals-row">
        <div class="meal-block">
          <div class="meal-time"><i class="ti ti-sun" style="font-size:14px"></i> 아침</div>
          <div class="meal-name">${d.breakfast.name}</div>
          <div class="meal-desc">${d.breakfast.desc || ''}</div>
          <div class="meal-actions">
            <button class="btn-sm" onclick="shuffleBreakfast(${i})"><i class="ti ti-refresh" style="font-size:11px"></i> 변경</button>
            <button class="btn-sm" onclick="editBreakfast(${i})"><i class="ti ti-edit" style="font-size:11px"></i> 직접입력</button>
          </div>
        </div>
        <div class="meal-block">
          <div class="meal-time"><i class="ti ti-moon" style="font-size:14px"></i> 저녁</div>
          <div class="dinner-items">
            <div class="dinner-item"><span class="dinner-tag tag-rice">밥</span><span class="dinner-text">${d.dinner.rice.name}</span></div>
            <div class="dinner-item"><span class="dinner-tag tag-soup">국</span><span class="dinner-text">${d.dinner.soup.name}</span></div>
            <div class="dinner-item"><span class="dinner-tag tag-side">반찬</span><span class="dinner-text">${d.dinner.side.name}</span></div>
          </div>
          <div class="meal-actions">
            <button class="btn-sm" onclick="shuffleDinner(${i})"><i class="ti ti-refresh" style="font-size:11px"></i> 전체변경</button>
            <button class="btn-sm" onclick="shufflePart(${i},'rice')">밥↺</button>
            <button class="btn-sm" onclick="shufflePart(${i},'soup')">국↺</button>
            <button class="btn-sm" onclick="shufflePart(${i},'side')">반찬↺</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function shuffleBreakfast(i) { plan[i].breakfast = rand(menuDB['아침']); renderPlan(); }
function shuffleDinner(i) { plan[i].dinner = newDinner(); renderPlan(); }
function shufflePart(i, part) {
  const map = { rice: '밥', soup: '국', side: '반찬' };
  plan[i].dinner[part] = rand(menuDB[map[part]]);
  renderPlan();
}

function editBreakfast(i) {
  addMode = false;
  editTarget = { i };
  document.getElementById('modalTitle').textContent = `${plan[i].day}요일 아침 메뉴 변경`;
  document.getElementById('menuCategoryInput').value = '아침';
  document.getElementById('menuNameInput').value = plan[i].breakfast.name;
  document.getElementById('menuDescInput').value = plan[i].breakfast.desc || '';
  document.getElementById('modal').classList.add('open');
}

function showAddModal() {
  addMode = true;
  editTarget = null;
  document.getElementById('modalTitle').textContent = '새 메뉴 추가';
  document.getElementById('menuNameInput').value = '';
  document.getElementById('menuDescInput').value = '';
  document.getElementById('menuCategoryInput').value = '아침';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveModal() {
  const name = document.getElementById('menuNameInput').value.trim();
  const desc = document.getElementById('menuDescInput').value.trim();
  const cat = document.getElementById('menuCategoryInput').value;
  if (!name) return;
  const menu = { name, desc };
  if (addMode) { menuDB[cat].push(menu); renderLibrary(); closeModal(); return; }
  if (editTarget != null) { plan[editTarget.i].breakfast = menu; renderPlan(); closeModal(); }
}

function toggleLibrary() {
  const lib = document.getElementById('menuLibrary');
  if (lib.style.display === 'none') { renderLibrary(); lib.style.display = 'block'; }
  else lib.style.display = 'none';
}

function renderLibrary() {
  const labels = { 아침: '아침 (한그릇)', 밥: '저녁 - 밥', 국: '저녁 - 국·찌개', 반찬: '저녁 - 반찬' };
  document.getElementById('libraryContent').innerHTML = Object.entries(menuDB).map(([cat, items]) => `
    <div class="cat-label">${labels[cat]}</div>
    <div class="chips">${items.map(m => `<span class="chip">${m.name}</span>`).join('')}</div>
  `).join('');
}

initPlan();
</script>
</body>
</html>
